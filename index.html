<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Academy Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --success: #00B894;
            --danger: #D63031;
            --warning: #FDCB6E;
            --bg: #F0F2F5;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 { color: #2D3436; text-shadow: 2px 2px 0px #FFF; margin-top: 20px; }

        /* Game Containers */
        .game-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin: 20px;
            border: 4px solid white;
            transition: transform 0.3s ease;
        }

        .hidden { display: none; }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .timer-bar-container {
            width: 100%;
            height: 12px;
            background: #E0E0E0;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            background: var(--success);
            transition: width 0.1s linear, background 0.3s ease;
        }

        /* Buttons */
        button {
            padding: 12px 24px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 0px #4834D4;
            margin: 5px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #4834D4;
        }

        button:hover { filter: brightness(1.1); }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .wrong-anim { animation: shake 0.3s ease-in-out; }

        @keyframes pop {
            50% { transform: scale(1.1); }
        }
        .correct-anim { animation: pop 0.3s ease-out; }

        /* Specific Game Layouts */
        .color-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            display: inline-block;
            margin: 10px;
        }

        .count-item { font-size: 2rem; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

<h1>🌟 Kids Academy 🌟</h1>

<div id="menu" class="game-container">
    <h2 style="margin-top:0">Ready to Play?</h2>
    <div style="display: grid; gap: 10px;">
        <button onclick="startGame('color')">🎨 Master of Colors</button>
        <button onclick="startGame('count')">🔢 Counting King</button>
        <button onclick="startGame('animal')">🐾 Animal Sounds</button>
        <button onclick="startGame('shape')">🔷 Shape Hero</button>
    </div>
</div>

<div id="game-board" class="game-container hidden">
    <div class="stats-bar">
        <span>⭐ <span id="score">0</span></span>
        <span>Level: <span id="level">1</span></span>
        <span>❤️ <span id="lives">3</span></span>
    </div>
    
    <div class="timer-bar-container">
        <div id="timer-fill"></div>
    </div>

    <h2 id="question-text">Question goes here?</h2>
    
    <div id="action-area">
        </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <button style="background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d;" onclick="exitToMenu()">Quit</button>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

  <div id="menu" class="game-container">
    <h2 style="margin-top:0">Ready to Play?</h2>
    <p style="font-weight: bold; color: var(--primary);">🏆 All-Time High Score: <span id="high-score-display">0</span></p>
    <div style="display: grid; gap: 10px;">
        </div>
</div>
<script>
    // Game State
    let state = {
        currentGame: '',
        score: 0,
        level: 1,
        lives: 3,
        timer: 100,
        timerInterval: null,
        correctAnswer: null,
        timeLeft: 10 // seconds
    };

    const colors = ["red", "blue", "green", "yellow", "purple", "orange", "pink"];
    const animals = [
        { s: "Meow", a: "cat", e: "🐱" },
        { s: "Bark", a: "dog", e: "🐶" },
        { s: "Moo", a: "cow", e: "🐮" },
        { s: "Quack", a: "duck", e: "🦆" },
        { s: "Roar", a: "lion", e: "🦁" }
    ];

    function startGame(gameType) {
        state.currentGame = gameType;
        state.score = 0;
        state.level = 1;
        state.lives = 3;
        state.timeLeft = 10;
        
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-board').classList.remove('hidden');
        updateStats();
        nextQuestion();
    }

    function updateStats() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('level').innerText = state.level;
        document.getElementById('lives').innerText = state.lives;
    }

    function startTimer() {
        clearInterval(state.timerInterval);
        state.timeLeft = Math.max(3, 10 - (state.level * 0.5)); // Gets faster as you level up
        let currentTotal = state.timeLeft;
        
        state.timerInterval = setInterval(() => {
            state.timeLeft -= 0.1;
            let percentage = (state.timeLeft / currentTotal) * 100;
            const fill = document.getElementById('timer-fill');
            fill.style.width = percentage + "%";

            if (percentage < 30) fill.style.background = "var(--danger)";
            else fill.style.background = "var(--success)";

            if (state.timeLeft <= 0) {
                handleWrong();
            }
        }, 100);
    }

    function nextQuestion() {
        const area = document.getElementById('action-area');
        const qText = document.getElementById('question-text');
        area.innerHTML = '';
        startTimer();

        if (state.currentGame === 'color') {
            let count = Math.min(colors.length, 2 + state.level);
            let choices = [...colors].sort(() => 0.5 - Math.random()).slice(0, count);
            state.correctAnswer = choices[Math.floor(Math.random() * choices.length)];
            qText.innerText = `Find the ${state.correctAnswer.toUpperCase()} circle!`;
            
            choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'color-circle';
                btn.style.backgroundColor = c;
                btn.onclick = () => checkAnswer(c);
                area.appendChild(btn);
            });
        } 
        
        else if (state.currentGame === 'count') {
            let num = Math.floor(Math.random() * (5 + state.level)) + 1;
            state.correctAnswer = num;
            qText.innerText = "How many items do you see?";
            
            const display = document.createElement('div');
            const icons = ['🍎', '⭐️', '🐸', '🍕'];
            let icon = icons[Math.floor(Math.random()*icons.length)];
            for(let i=0; i<num; i++) display.innerHTML += `<span class="count-item">${icon}</span>`;
            area.appendChild(display);

            const btnGrid = document.createElement('div');
            btnGrid.className = 'btn-grid';
            let options = [num, num+1, num-1, num+2].filter(n => n > 0).sort(() => 0.5 - Math.random());
            [...new Set(options)].forEach(opt => {
                btnGrid.innerHTML += `<button onclick="checkAnswer(${opt})">${opt}</button>`;
            });
            area.appendChild(btnGrid);
        }

        else if (state.currentGame === 'animal') {
            let pick = animals[Math.floor(Math.random() * animals.length)];
            state.correctAnswer = pick.a;
            qText.innerText = `Who says "${pick.s}"?`;
            
            const btnGrid = document.createElement('div');
            btnGrid.className = 'btn-grid';
            animals.forEach(anim => {
                btnGrid.innerHTML += `<button onclick="checkAnswer('${anim.a}')" style="font-size:2rem">${anim.e}</button>`;
            });
            area.appendChild(btnGrid);
        }
    }

    function checkAnswer(val) {
        if (val === state.correctAnswer) {
            handleCorrect();
        } else {
            handleWrong();
        }
    }

    function handleCorrect() {
        document.getElementById('correctSound').play();
        state.score += 10 * state.level;
        if (state.score % 30 === 0) state.level++;
        
        const board = document.getElementById('game-board');
        board.classList.add('correct-anim');
        setTimeout(() => board.classList.remove('correct-anim'), 300);
        
        updateStats();
        nextQuestion();
    }

    function handleWrong() {
        document.getElementById('wrongSound').play();
        state.lives--;
        
        const board = document.getElementById('game-board');
        board.classList.add('wrong-anim');
        setTimeout(() => board.classList.remove('wrong-anim'), 300);

        if (state.lives <= 0) {
            alert(`Game Over! Final Score: ${state.score}`);
            exitToMenu();
        } else {
            updateStats();
            nextQuestion();
        }
    }

    function exitToMenu() {
        clearInterval(state.timerInterval);
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-board').classList.add('hidden');
    }
  // 1. Enhanced State with High Score
let state = {
    currentGame: '',
    score: 0,
    level: 1,
    lives: 3,
    timer: 100,
    timerInterval: null,
    correctAnswer: null,
    timeLeft: 10,
    highScore: localStorage.getItem('kidsAcademyHighScore') || 0 // Load on start
};

// 2. Function to show high score on the menu
function displayHighScore() {
    document.getElementById('high-score-display').innerText = state.highScore;
}

// Call this immediately to show the score when the page first opens
displayHighScore();

// 3. Update the handleWrong function to save the score
function handleWrong() {
    document.getElementById('wrongSound').play();
    state.lives--;
    
    const board = document.getElementById('game-board');
    board.classList.add('wrong-anim');
    setTimeout(() => board.classList.remove('wrong-anim'), 300);

    if (state.lives <= 0) {
        checkAndSaveHighScore(); // New check here!
        alert(`Game Over! Final Score: ${state.score}`);
        exitToMenu();
    } else {
        updateStats();
        nextQuestion();
    }
}

// 4. New Logic: Check and Save
function checkAndSaveHighScore() {
    if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem('kidsAcademyHighScore', state.highScore);
        displayHighScore();
        // Optional: Add a little celebration flair
        console.log("New Record Set!"); 
    }
}

// 5. Ensure the menu update happens when quitting
function exitToMenu() {
    clearInterval(state.timerInterval);
    checkAndSaveHighScore(); // Check even if they quit early
    document.getElementById('menu').classList.remove('hidden');
    document.getElementById('game-board').classList.add('hidden');
    displayHighScore();
}
</script>
</body>
</html>
